name: Deploy to EC2

on:
  push:
    branches:
      - main 

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Set up SSH
      uses: webfactory/ssh-agent@v0.8.1
      with:
        ssh-private-key: ${{ secrets.DEPLOY_KEY }}

    - name: Copy files to EC2
      run: |
        scp -i ${{ secrets.DEPLOY_KEY }} -r ./build/libs/*.jar ./Dockerfile ubuntu@13.124.235.140:/home/ubuntu/app

    - name: SSH into EC2 and deploy
      run: |
        ssh -i ${{ secrets.DEPLOY_KEY }} ubuntu@13.124.235.140 << 'EOF'
          cd /home/ubuntu/app
          sudo docker build -t yourhousehelper-server .
          sudo docker stop yourhousehelper-server || true
          sudo docker rm yourhousehelper-server || true
          sudo docker run -d -p 8080:8080 --env-file .env --name yourhousehelper-server yourhousehelper-server
        EOF
