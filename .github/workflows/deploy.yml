name: Deploy to EC2

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 코드 가져오기
      - name: Checkout
        uses: actions/checkout@v3

      # Java 설정
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      # gradlew 실행 권한
      - name: Grant execute permission
        run: chmod +x ./gradlew

      # GitHub에서 빌드
      - name: Build
        run: ./gradlew build -x test

      # EC2로 JAR 전송
      - name: Copy jar to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          source: "build/libs/*.jar"
          target: "/home/ubuntu/"

      # EC2에서 실행만
      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            sudo systemctl stop yourhousehelper || true
            mv /home/ubuntu/*.jar /home/ubuntu/app.jar
            sudo systemctl start yourhousehelper
