name: Java CI with Gradle and Deploy

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 212
        uses: actions/setup-java@v4
        with:
          java-version: '22'
          distribution: 'temurin'
      
      - name: Build with Gradle
        run: ./gradlew build -x test

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ secrets.DOCKER_USERNAME }}/yourhousehelper-server:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/yourhousehelper-server:latest
  
            sudo docker stop starthub-server || true
            sudo docker rm starthub-server || true
            sudo docker run -d \
              -p 8080:8080 \
              --env-file .env \
              --name starthub-server \
              -m 700m \
              -e JAVA_OPTS="-Xms256m -Xmx512m" \
              ${{ secrets.DOCKER_USERNAME }}/yourhousehelper-server:latest
